name: Repository integrity

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: repository-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy,rustfmt

      - name: Install build-analysis sandbox
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          bwrap --version
          bwrap --die-with-parent --new-session --unshare-all \
            --ro-bind / / --dev /dev --proc /proc --tmpfs /tmp -- /usr/bin/true

      - name: Validate repository contracts
        run: python3 scripts/validate_repository.py

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check domain model
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test domain model
        run: cargo test --workspace --all-targets --all-features

  compiler-product:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.1 --profile minimal --component clippy,rustfmt

      - name: Install Clang and product dependencies
        run: |
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key -o /tmp/apt.llvm.org.asc
          sudo install -m 0644 /tmp/apt.llvm.org.asc /usr/share/keyrings/apt.llvm.org.asc
          echo "deb [signed-by=/usr/share/keyrings/apt.llvm.org.asc] https://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          echo "deb [signed-by=/usr/share/keyrings/apt.llvm.org.asc] https://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install --yes bubblewrap clang-21 jq libclang-21-dev libclang-rt-21-dev llvm-21-dev llvm-22 ninja-build npm python3-jsonschema python3-yaml
          sudo npm install --global n@10.2.0
          sudo n 22.14.0
          hash -r
          sudo npm install --global @openai/codex@0.144.3
          bwrap --die-with-parent --new-session --unshare-all \
            --ro-bind / / --dev /dev --proc /proc --tmpfs /tmp -- /usr/bin/true

      - name: Build complete install surface
        run: |
          cargo build --workspace
          python3 scripts/build_helpers.py
          install_root="$RUNNER_TEMP/whyvec-install"
          cargo install --path crates/whyvec-cli --root "$install_root"
          python3 scripts/build_helpers.py --output "$install_root/bin"
          "$install_root/bin/whyvec" doctor --format json | jq -e '.ready == true'

      - name: Validate build adapters
        run: |
          npm ci --prefix tools/typescript-adapter
          python3 scripts/verify_compiler_fixtures.py
          python3 scripts/verify_build_causality.py
          python3 scripts/verify_cross_adapter_build_causality.py

      - name: Validate LLVM product and guarded workflow
        run: |
          python3 scripts/verify_llvm_transformer.py
          python3 scripts/verify_llvm_loop_identity.py
          python3 scripts/verify_optimization_causality.py
          python3 scripts/verify_demo_mutations.py

      - name: Install and verify Codex plugin
        run: |
          codex plugin marketplace add . --json
          codex plugin add whyvec@whyvec-local --json
          codex plugin list --json | jq -e '.. | strings | select(. == "whyvec")'

      - name: Run executable demo verification
        run: ./scripts/demo --ci

      - name: Verify real-world case and portable exports
        run: |
          output="$RUNNER_TEMP/superlu-evidence"
          python3 scripts/verify_real_world_superlu.py --whyvec target/debug/whyvec --output "$output"
          jq -e '.decision == "principled_refusal"' "$output/result.json"
          python3 scripts/check_portable_evidence.py

  judge-container:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Build and run pinned judge image
        run: containers/judge/build.sh
